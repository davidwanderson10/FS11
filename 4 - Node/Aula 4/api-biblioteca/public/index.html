<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>API Biblioteca — Frontend</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>API Biblioteca — Autores, Categorias & Livros</h1>
    <nav>
      <button id="tab-autores" class="active">Autores</button>
      <button id="tab-categorias">Categorias</button>
      <button id="tab-livros">Livros</button>
    </nav>
  </header>

  <main>
    <section id="autores-section" class="panel">
      <h2>Autores</h2>

      <div class="row">
        <form id="autor-form" class="form-inline">
          <input id="autor-nome" placeholder="Nome do autor" maxlength="200" required aria-label="Nome do autor">
          <div class="counter"><span id="autor-counter">0</span>/200</div>
          <button type="submit">Criar</button>
        </form>

        <div class="search">
          <input id="autor-search" placeholder="Buscar autores..." aria-label="Buscar autores">
        </div>
      </div>

      <ul id="autores-list" class="list"></ul>
      <div id="autores-empty" class="empty hidden">Nenhum autor encontrado.</div>
    </section>

    <section id="categorias-section" class="panel hidden">
      <h2>Categorias</h2>

      <div class="row">
        <form id="categoria-form" class="form-inline">
          <input id="categoria-nome" placeholder="Nome da categoria" maxlength="200" required aria-label="Nome da categoria">
          <div class="counter"><span id="categoria-counter">0</span>/200</div>
          <button type="submit">Criar</button>
        </form>

        <div class="search">
          <input id="categoria-search" placeholder="Buscar categorias..." aria-label="Buscar categorias">
        </div>
      </div>

      <ul id="categorias-list" class="list"></ul>
      <div id="categorias-empty" class="empty hidden">Nenhuma categoria encontrada.</div>
    </section>

    <section id="livros-section" class="panel hidden">
      <h2>Livros</h2>

      <div class="row">
        <form id="livro-form" class="form-inline">
          <input id="livro-titulo" placeholder="Título do livro" maxlength="200" required aria-label="Título do livro">
          <div class="counter"><span id="livro-counter">0</span>/200</div>
          <select id="livro-autor" aria-label="Autor do livro">
            <option value="">-- Autor --</option>
          </select>
          <select id="livro-categoria" aria-label="Categoria do livro">
            <option value="">-- Categoria --</option>
          </select>
          <button type="submit">Criar</button>
        </form>

        <div class="search">
          <input id="livro-search" placeholder="Buscar livros..." aria-label="Buscar livros">
        </div>
      </div>

      <ul id="livros-list" class="list"></ul>
      <div id="livros-empty" class="empty hidden">Nenhum livro encontrado.</div>
    </section>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- Confirmation modal -->
  <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-content">
      <p id="confirm-message">Tem certeza?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn cancel">Cancelar</button>
        <button id="confirm-ok" class="btn delete">Apagar</button>
      </div>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
